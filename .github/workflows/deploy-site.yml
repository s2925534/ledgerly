name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/deploy-site.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/site
          push: true
          tags: |
            ghcr.io/s2925534/corroborly-site:main
            ghcr.io/s2925534/corroborly-site:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Update corroborly.com on the NAS
        working-directory: /Users/pedro/Documents/_Projects/synology-site-deployer
        run: synology-site update corroborly.com --health-path /health --container-name corroborly-site
