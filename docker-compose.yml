# Corroborly local API, for use with `synology-site deploy` from
# ../synology-site-deployer (see docs/DEPLOY.md) or plain `docker compose up`.
#
# Requires a populated .env alongside this file (copy .env.example) with at
# least CORROBORLY_API_USERNAME and CORROBORLY_API_PASSWORD set --
# compose refuses to start otherwise.
#
# Single container, single process: see the Dockerfile for why this must
# never be scaled to multiple replicas or workers.

services:
  corroborly-api:
    build: .
    container_name: corroborly-api
    restart: unless-stopped
    ports:
      - "${CORROBORLY_HOST_PORT:-8000}:8000"
    environment:
      CORROBORLY_API_USERNAME: ${CORROBORLY_API_USERNAME:?Set CORROBORLY_API_USERNAME in .env before starting}
      CORROBORLY_API_PASSWORD: ${CORROBORLY_API_PASSWORD:?Set CORROBORLY_API_PASSWORD in .env before starting}
      CORROBORLY_WORKSPACE_ROOT: /data/workspaces
      CORROBORLY_API_SESSION_HOURS: ${CORROBORLY_API_SESSION_HOURS:-12}
      CORROBORLY_UPLOAD_MAX_FILES: ${CORROBORLY_UPLOAD_MAX_FILES:-25}
      CORROBORLY_UPLOAD_MAX_FILE_SIZE_MB: ${CORROBORLY_UPLOAD_MAX_FILE_SIZE_MB:-50}
      CORROBORLY_DB_BACKEND: ${CORROBORLY_DB_BACKEND:-}
      CORROBORLY_POSTGRES_HOST: ${CORROBORLY_POSTGRES_HOST:-}
      CORROBORLY_POSTGRES_PORT: ${CORROBORLY_POSTGRES_PORT:-}
      CORROBORLY_POSTGRES_USER: ${CORROBORLY_POSTGRES_USER:-}
      CORROBORLY_POSTGRES_PASSWORD: ${CORROBORLY_POSTGRES_PASSWORD:-}
      CORROBORLY_POSTGRES_DATABASE: ${CORROBORLY_POSTGRES_DATABASE:-}
      CORROBORLY_MARIADB_HOST: ${CORROBORLY_MARIADB_HOST:-}
      CORROBORLY_MARIADB_PORT: ${CORROBORLY_MARIADB_PORT:-}
      CORROBORLY_MARIADB_USER: ${CORROBORLY_MARIADB_USER:-}
      CORROBORLY_MARIADB_PASSWORD: ${CORROBORLY_MARIADB_PASSWORD:-}
      CORROBORLY_MARIADB_DATABASE: ${CORROBORLY_MARIADB_DATABASE:-}
    volumes:
      # Bind-mounted, not a named volume: a researcher may want direct
      # filesystem access to their own workspace files (backups, inspecting
      # YAML by hand) via the NAS's own file sharing, not just through the
      # API. Never bind-mount anything from inside a local Zotero directory
      # here -- workspaces reference Zotero storage by path, they do not
      # need Zotero's own directory mounted into this container.
      - ./data/workspaces:/data/workspaces

  # Optional (Phase 24), non-default: `docker compose --profile db-backends up`
  # to also run a local MariaDB/PostgreSQL for testing the secondary-backend
  # feature. Neither starts with plain `docker compose up` -- SQLite alone
  # remains the default, zero-config path for `docker compose up` with no
  # profile flag. Point CORROBORLY_DB_BACKEND/CORROBORLY_{POSTGRES,MARIADB}_HOST
  # at these service names (postgres-backend / mariadb-backend) in .env if
  # you use this profile, since the corroborly-api container reaches them by
  # Docker network name, not localhost.
  postgres-backend:
    image: postgres:16-alpine
    profiles: ["db-backends"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CORROBORLY_POSTGRES_USER:-corroborly}
      POSTGRES_PASSWORD: ${CORROBORLY_POSTGRES_PASSWORD:?Set CORROBORLY_POSTGRES_PASSWORD in .env to use the db-backends profile}
      POSTGRES_DB: ${CORROBORLY_POSTGRES_DATABASE:-corroborly}
    volumes:
      - ./data/postgres-backend:/var/lib/postgresql/data

  mariadb-backend:
    image: mariadb:11
    profiles: ["db-backends"]
    restart: unless-stopped
    environment:
      MARIADB_USER: ${CORROBORLY_MARIADB_USER:-corroborly}
      MARIADB_PASSWORD: ${CORROBORLY_MARIADB_PASSWORD:?Set CORROBORLY_MARIADB_PASSWORD in .env to use the db-backends profile}
      MARIADB_DATABASE: ${CORROBORLY_MARIADB_DATABASE:-corroborly}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - ./data/mariadb-backend:/var/lib/mysql
