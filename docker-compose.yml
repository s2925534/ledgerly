# Ledgerly local API, for use with `synology-site deploy` from
# ../synology-site-deployer (see docs/DEPLOY.md) or plain `docker compose up`.
#
# Requires a populated .env alongside this file (copy .env.example) with at
# least LEDGERLY_API_USERNAME and LEDGERLY_API_PASSWORD set --
# compose refuses to start otherwise.
#
# Single container, single process: see the Dockerfile for why this must
# never be scaled to multiple replicas or workers.

services:
  ledgerly-api:
    build: .
    restart: unless-stopped
    ports:
      - "${LEDGERLY_HOST_PORT:-8000}:8000"
    environment:
      LEDGERLY_API_USERNAME: ${LEDGERLY_API_USERNAME:?Set LEDGERLY_API_USERNAME in .env before starting}
      LEDGERLY_API_PASSWORD: ${LEDGERLY_API_PASSWORD:?Set LEDGERLY_API_PASSWORD in .env before starting}
      LEDGERLY_WORKSPACE_ROOT: /data/workspaces
      LEDGERLY_API_SESSION_HOURS: ${LEDGERLY_API_SESSION_HOURS:-12}
      LEDGERLY_UPLOAD_MAX_FILES: ${LEDGERLY_UPLOAD_MAX_FILES:-25}
      LEDGERLY_UPLOAD_MAX_FILE_SIZE_MB: ${LEDGERLY_UPLOAD_MAX_FILE_SIZE_MB:-50}
      LEDGERLY_DB_BACKEND: ${LEDGERLY_DB_BACKEND:-}
      LEDGERLY_POSTGRES_HOST: ${LEDGERLY_POSTGRES_HOST:-}
      LEDGERLY_POSTGRES_PORT: ${LEDGERLY_POSTGRES_PORT:-}
      LEDGERLY_POSTGRES_USER: ${LEDGERLY_POSTGRES_USER:-}
      LEDGERLY_POSTGRES_PASSWORD: ${LEDGERLY_POSTGRES_PASSWORD:-}
      LEDGERLY_POSTGRES_DATABASE: ${LEDGERLY_POSTGRES_DATABASE:-}
      LEDGERLY_MARIADB_HOST: ${LEDGERLY_MARIADB_HOST:-}
      LEDGERLY_MARIADB_PORT: ${LEDGERLY_MARIADB_PORT:-}
      LEDGERLY_MARIADB_USER: ${LEDGERLY_MARIADB_USER:-}
      LEDGERLY_MARIADB_PASSWORD: ${LEDGERLY_MARIADB_PASSWORD:-}
      LEDGERLY_MARIADB_DATABASE: ${LEDGERLY_MARIADB_DATABASE:-}
    volumes:
      # Bind-mounted, not a named volume: a researcher may want direct
      # filesystem access to their own workspace files (backups, inspecting
      # YAML by hand) via the NAS's own file sharing, not just through the
      # API. Never bind-mount anything from inside a local Zotero directory
      # here -- workspaces reference Zotero storage by path, they do not
      # need Zotero's own directory mounted into this container.
      - ./data/workspaces:/data/workspaces

  # Optional (Phase 24), non-default: `docker compose --profile db-backends up`
  # to also run a local MariaDB/PostgreSQL for testing the secondary-backend
  # feature. Neither starts with plain `docker compose up` -- SQLite alone
  # remains the default, zero-config path for `docker compose up` with no
  # profile flag. Point LEDGERLY_DB_BACKEND/LEDGERLY_{POSTGRES,MARIADB}_HOST
  # at these service names (postgres-backend / mariadb-backend) in .env if
  # you use this profile, since the ledgerly-api container reaches them by
  # Docker network name, not localhost.
  postgres-backend:
    image: postgres:16-alpine
    profiles: ["db-backends"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LEDGERLY_POSTGRES_USER:-ledgerly}
      POSTGRES_PASSWORD: ${LEDGERLY_POSTGRES_PASSWORD:?Set LEDGERLY_POSTGRES_PASSWORD in .env to use the db-backends profile}
      POSTGRES_DB: ${LEDGERLY_POSTGRES_DATABASE:-ledgerly}
    volumes:
      - ./data/postgres-backend:/var/lib/postgresql/data

  mariadb-backend:
    image: mariadb:11
    profiles: ["db-backends"]
    restart: unless-stopped
    environment:
      MARIADB_USER: ${LEDGERLY_MARIADB_USER:-ledgerly}
      MARIADB_PASSWORD: ${LEDGERLY_MARIADB_PASSWORD:?Set LEDGERLY_MARIADB_PASSWORD in .env to use the db-backends profile}
      MARIADB_DATABASE: ${LEDGERLY_MARIADB_DATABASE:-ledgerly}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - ./data/mariadb-backend:/var/lib/mysql
